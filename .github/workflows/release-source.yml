# https://github.com/kihyyo/tving

name: Package and Release Source

on:
  schedule:
    - cron: "0 */3 * * *"  # KST 기준 0, 3, 6, 9, 12, 15, 18, 21시마다 본진 변경 감지
  workflow_dispatch:       # 수동 실행 허용

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check Out Local Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 태그 기록을 정확히 조회하기 위해 전체 기록 가져오기

      - name: Fetch Upstream Latest Commit SHA
        id: upstream_info
        uses: actions/github-script@v7
        with:
          script: |
            const commits = await github.rest.repos.listCommits({
              owner: 'kihyyo',
              repo: 'tving',
              per_page: 1
            });
            const latestSha = commits.data[0].sha;
            core.setOutput('sha', latestSha);

      - name: Check If This Commit Already Released
        id: check_tag
        run: |
          UPSTREAM_SHA="${{ steps.upstream_info.outputs.sha }}"
          
          # 내 저장소의 기존 릴리스 태그 리스트나 커밋 로그에 본진 SHA가 포함되어 있는지 검사
          if git log --tags --grep="$UPSTREAM_SHA" >/dev/null 2>&1 || git tag -l | xargs -I {} git tag -v {} 2>/dev/null | grep "$UPSTREAM_SHA" >/dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch Upstream Source Code
        if: steps.check_tag.outputs.changed == 'true'
        run: |
          UPSTREAM_SHA="${{ steps.upstream_info.outputs.sha }}"
          
          # 임시 디렉토리에 본진 소스 코드만 바로 다운로드하여 압축 해제
          mkdir -p temp_source
          curl -L "https://github.com/kihyyo/tving/archive/${UPSTREAM_SHA}.tar.gz" | tar -xzf - --strip-components=1 -C temp_source
          
          # 워크플로우를 제외한 기존 파일 삭제 후 본진 소스로 전면 교체
          find . -maxdepth 1 ! -name '.' ! -name '..' ! -name '.git' ! -name '.github' -exec rm -rf {} +
          cp -r temp_source/. .
          rm -rf temp_source

      - name: Determine Version Tag
        if: steps.check_tag.outputs.changed == 'true'
        id: get_version
        run: |
          # KST(한국 표준시) 기준 현재 날짜와 시간으로 버전 명명
          USER_DATE_TAG=$(TZ="Asia/Seoul" date +"v%Y.%m.%d-%H%M")
          echo "version=${USER_DATE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Push Git Tag to My Repository
        if: steps.check_tag.outputs.changed == 'true'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          UPSTREAM_SHA="${{ steps.upstream_info.outputs.sha }}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 추적 관리를 위해 본진 커밋 SHA를 본문에 명시하여 커밋 및 주석 달린 태그(Annotated Tag) 생성
          git add -A
          git commit -m "Sync source from upstream commit ${UPSTREAM_SHA}" || true
          git tag -a "$VERSION" -m "Release $VERSION based on upstream commit $UPSTREAM_SHA"
          git push origin main --tags

      - name: Create GitHub Release
        if: steps.check_tag.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: ${{ steps.get_version.outputs.version }}
          body: "Tving Downloader Source Code Updated from Upstream Commit (${{ steps.upstream_info.outputs.sha }})"
